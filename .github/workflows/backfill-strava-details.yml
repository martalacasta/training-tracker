name: Backfill Strava activity details

on:
  workflow_dispatch:
    inputs:
      max_per_run:
        description: 'Maximum activities to process in this run (default 250)'
        required: false
        default: '50'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
      BACKFILL_MAX: ${{ inputs.max_per_run }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run data:backfill
      - name: Commit updated activities
        run: |
          if [[ -n "$(git status --porcelain public/data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data
            git commit -m "chore(data): backfill Strava description and calories"
            git push
          fi
