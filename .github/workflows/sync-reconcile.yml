name: Sync Strava and Coach Data

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
      GITHUB_MODELS_MODEL: ${{ vars.MODELS_MODEL }}
      GITHUB_MODELS_API_KEY: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          test -n "$STRAVA_CLIENT_ID"
          test -n "$STRAVA_CLIENT_SECRET"
          test -n "$STRAVA_REFRESH_TOKEN"

      - name: Sync Strava
        run: npm run data:sync

      - name: Build coach state and recommendations
        run: npm run data:pipeline

      - name: Commit updated data
        run: |
          if [[ -n "$(git status --porcelain public/data .runtime/sync-state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data .runtime/sync-state.json
            git commit -m "chore(data): refresh Strava and coaching outputs"
            git push
          fi
